<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาสถานีตำรวจ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --blue: #1a3a5c;
    --blue-mid: #1f4e79;
    --white: #f5f5f0;
    --gray: #a0a8b0;
    --card-bg: #122036;
    --border: rgba(201,168,76,0.25);
    --warn-bg: rgba(220,80,40,0.12);
    --warn-border: rgba(220,80,40,0.45);
    --warn-text: #ff8a65;
    --warn-icon: #ff6b35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(26,58,92,0.5) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.6s ease;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.35rem 1rem;
    font-size: 0.78rem;
    color: var(--gold-light);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s infinite;
  }

  h1 {
    font-family: 'Prompt', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    line-height: 1.2;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--gold); }
  .subtitle { color: var(--gray); font-size: 0.95rem; }

  .search-wrapper {
    position: relative;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .search-icon {
    position: absolute;
    left: 1.1rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    pointer-events: none;
    color: var(--gold);
  }

  #searchInput {
    width: 100%;
    padding: 1rem 1rem 1rem 3rem;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--white);
    font-family: 'Sarabun', sans-serif;
    font-size: 1.05rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput::placeholder { color: var(--gray); }

  #searchInput:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }

  .stats-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.2rem;
    font-size: 0.85rem;
    color: var(--gray);
    animation: fadeUp 0.6s ease 0.15s both;
  }

  #resultCount { color: var(--gold-light); font-weight: 600; }

  #results {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  /* ===== STATION CARD ===== */
  .station-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1.4rem;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
  }

  .station-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .station-card:hover {
    transform: translateY(-2px);
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .station-card:hover::before { opacity: 1; }
  .station-card.active { border-color: var(--gold); background: rgba(201,168,76,0.07); }
  .station-card.active::before { opacity: 1; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .station-name {
    font-family: 'Prompt', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--white);
  }

  .province-tag {
    background: rgba(201,168,76,0.15);
    color: var(--gold-light);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 6px;
    padding: 0.2rem 0.6rem;
    font-size: 0.75rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tambon-list {
    font-size: 0.82rem;
    color: var(--gray);
    line-height: 1.6;
  }

  .tambon-list .match {
    color: var(--gold-light);
    font-weight: 600;
    background: rgba(201,168,76,0.12);
    border-radius: 4px;
    padding: 0 3px;
  }

  /* ===== WARNING BADGE (inline on tambon) ===== */
  .warn-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: 4px;
    padding: 0 5px;
    font-size: 0.7rem;
    color: var(--warn-text);
    vertical-align: middle;
    margin-left: 3px;
    cursor: help;
    white-space: nowrap;
  }

  /* ===== WARNING PANEL (inside detail) ===== */
  .overlap-warning {
    display: none;
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    margin-top: 0.8rem;
    animation: expandDown 0.25s ease;
  }

  .overlap-warning.has-overlap { display: block; }

  .overlap-title {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--warn-icon);
    margin-bottom: 0.5rem;
  }

  .overlap-title::before { content: '⚠️'; font-size: 0.9rem; }

  .overlap-items {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .overlap-item {
    font-size: 0.8rem;
    color: var(--warn-text);
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .overlap-item .tambon-name {
    font-weight: 600;
    color: #ffab91;
    min-width: 120px;
    flex-shrink: 0;
  }

  .overlap-item .other-stations {
    color: var(--warn-text);
    opacity: 0.85;
  }

  /* ===== DETAIL PANEL ===== */
  .detail-panel {
    display: none;
    margin-top: 0.8rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
    animation: expandDown 0.25s ease;
  }

  .detail-panel.open { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem 1.5rem;
    margin-bottom: 0.8rem;
  }

  .detail-item { font-size: 0.82rem; }
  .detail-label { color: var(--gray); margin-bottom: 0.1rem; font-size: 0.75rem; }
  .detail-value { color: var(--white); }
  .detail-value a { color: var(--gold-light); text-decoration: none; }
  .detail-value a:hover { text-decoration: underline; }

  .all-tambons {
    font-size: 0.82rem;
    color: var(--gray);
    line-height: 1.9;
  }

  .tambon-token {
    display: inline-block;
    margin: 1px 3px 1px 0;
    cursor: default;
  }

  .tambon-token.dup {
    color: var(--warn-text);
    text-decoration: underline dotted var(--warn-border);
  }

  .tambon-token.match-hl {
    color: var(--gold-light);
    font-weight: 600;
    background: rgba(201,168,76,0.12);
    border-radius: 4px;
    padding: 0 3px;
  }

  .tambon-token.dup.match-hl {
    background: rgba(220,80,40,0.15);
    color: #ffab91;
    font-weight: 600;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--gray);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
  .empty-state p { font-size: 0.95rem; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes expandDown {
    from { opacity: 0; transform: scaleY(0.9); transform-origin: top; }
    to { opacity: 1; transform: scaleY(1); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ===== COPY BUTTON ===== */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    margin-top: 0.45rem;
    padding: 0.3rem 0.75rem;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 7px;
    color: var(--gold-light);
    font-family: 'Sarabun', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
  }

  .copy-btn:hover {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
  }

  .copy-btn:active { transform: scale(0.96); }

  .copy-btn.copied {
    background: rgba(72,187,120,0.15);
    border-color: rgba(72,187,120,0.5);
    color: #6ee7a0;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--blue-mid); border-radius: 3px; }

  @media (max-width: 600px) {
    .detail-grid { grid-template-columns: 1fr; }
    .overlap-item .tambon-name { min-width: 90px; }
  }
</style>
</head>
<body>

  <div id="results"></div>
</div>

const DUP_MAP = {"บางงา|ลพบุรี|ท่าวุ้ง": ["สภ.ท่าวุ้ง", "สภ.ท่าวุ้ง"], "ศรีมหาโพธิ (บางหมู่)|ปราจีนบุรี|ศรีมหาโพธิ": ["สภ.ศรีมหาโพธิ", "สภ.ระเบาะไผ่"], "หนองโพรง (บางหมู่)|ปราจีนบุรี|ศรีมหาโพธิ": ["สภ.ศรีมหาโพธิ", "สภ.ระเบาะไผ่"], "หัวหว้า (บางหมู่)|ปราจีนบุรี|ศรีมหาโพธิ": ["สภ.ศรีมหาโพธิ", "สภ.ระเบาะไผ่"], "ในเมือง|ขอนแก่น|เมือง": ["สภ.เมืองขอนแก่น", "สภ.บ้านไผ่"], "เวียง|เชียงราย|เชียงแสน": ["สภ.เชียงแสน", "สภ.เชียงของ"], "พระบาท (บางส่วน)|ลำปาง|เมือง": ["สภ.เมืองลำปาง", "สภ.เขลางค์นคร"], "บ่อถ้ำ (บางส่วน)|กำแพงเพชร|ขาณุวรลักษบุรี": ["สภ.ขาณุวรลักษบุรี", "สภ.ปางมะค่า"], "วังหามแห (บางส่วน)|กำแพงเพชร|ขาณุวรลักษบุรี": ["สภ.ขาณุวรลักษบุรี", "สภ.ปางมะค่า"], "วังชะพลู (บางส่วน)|กำแพงเพชร|ขาณุวรลักษบุรี": ["สภ.ขาณุวรลักษบุรี", "สภ.ปางมะค่า"], "ปากน้ำโพ (บางส่วน)|นครสวรรค์|เมือง": ["สภ.เมืองนครสวรรค์", "สภ.หนองปลิง"], "เกรียงไกร (บางส่วน)|นครสวรรค์|เมือง": ["สภ.บางม่วง", "สภ.หนองปลิง"], "แควใหญ่ (บางส่วน)|นครสวรรค์|เมือง": ["สภ.บางม่วง", "สภ.หนองปลิง"], "วังนกแอ่น (บางส่วน)|พิษณุโลก|วังทอง": ["สภ.วังทอง", "สภ.แก่งโสภา"], "วงฆ้อง (บางส่วน)|พิษณุโลก|พรหมพิราม": ["สภ.พรหมพิราม", "สภ.ดงประคำ"], "ตลุกเทียม (บางส่วน)|พิษณุโลก|พรหมพิราม": ["สภ.พรหมพิราม", "สภ.ดงประคำ"], "ศรีภิรมย์ (บางส่วน)|พิษณุโลก|พรหมพิราม": ["สภ.พรหมพิราม", "สภ.ดงประคำ"]};

const input = document.getElementById('searchInput');
const resultsEl = document.getElementById('results');
const countEl = document.getElementById('resultCount');
let activeCard = null;

function isDup(tambon, province, stationName) {
  const amp = STATION_AMPHOE[stationName] || '';
  const key = `${tambon.trim()}|${province}|${amp}`;
  return DUP_MAP[key];
}

function getOtherStations(tambon, province, selfName) {
  const amp = STATION_AMPHOE[selfName] || '';
  const key = `${tambon.trim()}|${province}|${amp}`;
  const stations = DUP_MAP[key] || [];
  return stations.filter(s => s !== selfName);
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<span class="match">$1</span>');
}

function formatPhone(p) {
  return p && p !== '0-' && p !== '-' ? `<a href="tel:${p}">${p}</a>` : '-';
}

function buildTambonToken(t, province, stationName, query) {
  const isMatch = query && t.includes(query);
  const dup = isDup(t, province, stationName);
  const others = dup ? getOtherStations(t, province, stationName) : [];

  let cls = 'tambon-token';
  if (dup) cls += ' dup';
  if (isMatch) cls += ' match-hl';

  const warnBadge = dup
    ? `<span class="warn-badge" title="ตำบลนี้ยังอยู่ในเขตรับผิดชอบของ: ${others.join(', ')}">⚠️ ${others.length + 1} สภ.</span>`
    : '';

  return `<span class="${cls}">${t}${warnBadge}</span>`;
}

function buildOverlapWarning(tambons, province, stationName) {
  const overlapItems = [];
  tambons.forEach(t => {
    const others = getOtherStations(t, province, stationName);
    if (others.length > 0) {
      overlapItems.push({ tambon: t, others });
    }
  });

  if (overlapItems.length === 0) return '';

  const items = overlapItems.map(({ tambon, others }) => `
    <div class="overlap-item">
      <span class="tambon-name">ต.${tambon.replace(/\s*\(.*\)/,'').trim()}</span>
      <span class="other-stations">→ ยังอยู่ใน: ${others.join(', ')}</span>
    </div>
  `).join('');

  return `
    <div class="overlap-warning has-overlap">
      <div class="overlap-title">ตำบลที่มีมากกว่า 1 สถานีรับผิดชอบ (${overlapItems.length} ตำบล)</div>
      <div class="overlap-items">${items}</div>
    </div>
  `;
}

function render(query) {
  const q = query.trim();
  resultsEl.innerHTML = '';
  activeCard = null;

  if (!q) {
    countEl.textContent = '';
    resultsEl.innerHTML = '<div class="empty-state"><div class="icon">🏛️</div><p>พิมพ์ชื่อตำบล อำเภอ หรือจังหวัด เพื่อเริ่มค้นหา</p></div>';
    return;
  }

  const matched = DATA.filter(s => {
    const name = s.station_name || '';
    const prov = s.province || '';
    const addr = s.address || '';
    const tambons = s.jurisdiction_subdistricts || [];
    return name.includes(q) || prov.includes(q) || addr.includes(q) || tambons.some(t => t.includes(q));
  });

  countEl.textContent = `พบ ${matched.length.toLocaleString()} สถานี`;

  if (matched.length === 0) {
    resultsEl.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>ไม่พบสถานีตำรวจที่ตรงกัน</p></div>';
    return;
  }

  matched.slice(0, 80).forEach(s => {
    const tambons = s.jurisdiction_subdistricts || [];
    const prov = s.province;
    const sName = s.station_name;
    const matchedTambons = tambons.filter(t => t.includes(q));
    const otherTambons = tambons.filter(t => !t.includes(q));

    // Preview row: show matched tambons first
    let tamPreview = '';
    if (matchedTambons.length > 0) {
      tamPreview = matchedTambons.map(t => buildTambonToken(t, prov, sName, q)).join(' · ');
      if (otherTambons.length > 0) tamPreview += ` <span style="opacity:0.45;font-size:0.78rem">+${otherTambons.length} ตำบล</span>`;
    } else {
      tamPreview = tambons.slice(0, 4).map(t => buildTambonToken(t, prov, sName, '')).join(' · ');
      if (tambons.length > 4) tamPreview += ` <span style="opacity:0.45;font-size:0.78rem">+${tambons.length - 4}</span>`;
    }

    // Full tambon list for detail
    const fullTambons = tambons.map(t => buildTambonToken(t, prov, sName, q)).join(' · ');

    // Overlap warning block
    const overlapWarning = buildOverlapWarning(tambons, prov, sName);
    const hasOverlap = overlapWarning !== '';

    const card = document.createElement('div');
    card.className = 'station-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="station-name">${highlight(sName, q)}${hasOverlap ? ' <span style="font-size:0.75rem;color:var(--warn-text);font-family:Sarabun">⚠️</span>' : ''}</div>
        <span class="province-tag">${prov}</span>
      </div>
      <div class="tambon-list">${tamPreview}</div>
      <div class="detail-panel">
        <div class="detail-grid">
          <div class="detail-item">
            <div class="detail-label">📍 ที่อยู่</div>
            <div class="detail-value">${s.address || '-'}</div>
            ${s.address ? `<button class="copy-btn" data-addr="${s.address.replace(/"/g,'&quot;')}">📋 คัดลอกที่อยู่</button>` : ''}
          </div>
          <div class="detail-item">
            <div class="detail-label">📞 โทรศัพท์</div>
            <div class="detail-value">${formatPhone(s.phone)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">📮 รหัสไปรษณีย์</div>
            <div class="detail-value">${s.zip_code || '-'}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">📧 อีเมล</div>
            <div class="detail-value">${s.email ? `<a href="mailto:${s.email}">${s.email}</a>` : '-'}</div>
          </div>
          ${s.website && s.website !== 'ไม่มีข้อมูล' ? `
          <div class="detail-item">
            <div class="detail-label">🌐 เว็บไซต์</div>
            <div class="detail-value"><a href="${s.website}" target="_blank" rel="noopener">เปิดเว็บไซต์ ↗</a></div>
          </div>` : ''}
        </div>
        <div class="detail-item">
          <div class="detail-label" style="margin-bottom:0.5rem">🗺️ ตำบลในเขตรับผิดชอบทั้งหมด (${tambons.length} ตำบล)</div>
          <div class="all-tambons">${fullTambons}</div>
        </div>
        ${overlapWarning}
      </div>
    `;

    card.addEventListener('click', (e) => {
      // ถ้ากดปุ่ม copy ไม่ต้อง toggle การ์ด
      if (e.target.closest('.copy-btn')) return;
      const panel = card.querySelector('.detail-panel');
      if (activeCard && activeCard !== card) {
        activeCard.classList.remove('active');
        activeCard.querySelector('.detail-panel').classList.remove('open');
      }
      card.classList.toggle('active');
      panel.classList.toggle('open');
      activeCard = card.classList.contains('active') ? card : null;
    });

    // Wire copy buttons
    card.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        copyAddress(btn, btn.dataset.addr);
      });
    });

    resultsEl.appendChild(card);
  });

  if (matched.length > 80) {
    const note = document.createElement('div');
    note.style.cssText = 'text-align:center;color:var(--gray);font-size:0.82rem;padding:1rem;';
    note.textContent = `แสดง 80 จาก ${matched.length} ผลลัพธ์ กรุณาค้นหาให้เฉพาะเจาะจงขึ้น`;
    resultsEl.appendChild(note);
  }
}

function copyAddress(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '✅ คัดลอกแล้ว';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '📋 คัดลอกที่อยู่';
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.classList.add('copied');
    btn.innerHTML = '✅ คัดลอกแล้ว';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '📋 คัดลอกที่อยู่';
    }, 2000);
  });
}

let timer;
input.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(() => render(input.value), 180);
});

render('');
</script>
